name: Node.js CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        # Caminho para o cache funcionar corretamente na sua estrutura
        cache-dependency-path: 'backend/package-lock.json'

    - name: Install dependencies
      run: npm install
      working-directory: ./backend

    - name: Run Tests
      run: npm test
      working-directory: ./backend